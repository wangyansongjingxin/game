<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="3分钟解压屋的 GitHub Pages 入口页，点一下就能进入五个轻量解压小游戏。" />
  <meta name="theme-color" content="#6c7cff" />
  <meta property="og:title" content="3分钟解压屋" />
  <meta property="og:description" content="点气泡、炸烦恼、甩果冻、敲木鱼、连星星的轻量解压小游戏。" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="3分钟解压屋" />
  <meta name="twitter:description" content="点一下就能进入的轻量解压小游戏。" />
  <title>3分钟解压屋</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f3ee;
      --card: rgba(255, 255, 255, 0.78);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #8b5cf6;
      --accent-2: #14b8a6;
      --border: rgba(139, 92, 246, 0.18);
      --shadow: 0 18px 60px rgba(31, 41, 55, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.15), transparent 28%),
        linear-gradient(135deg, #fdfbf7 0%, #f2f8ff 100%);
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.08;
    }

    p {
      margin: 0;
      line-height: 1.7;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0 28px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      color: #5b21b6;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(31, 41, 55, 0.08);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(20, 184, 166, 0.08);
      color: #0f766e;
      border-color: rgba(20, 184, 166, 0.18);
    }

    .footer {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px dashed rgba(107, 114, 128, 0.24);
      font-size: 0.94rem;
      color: var(--muted);
    }

    code {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(107, 114, 128, 0.1);
      color: #374151;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Welcome to the decompression room</p>
    <h1>3分钟解压屋</h1>
    <p>
      这是一个轻量的本地小游戏站点。打开后先挑一个模式，点气泡、炸烦恼、甩果冻、敲木鱼，或者连星星。
    </p>

    <div class="highlights">
      <span class="chip">轻松上手</span>
      <span class="chip">支持手机</span>
      <span class="chip">本地保存记录</span>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="play/index.html">进入 3分钟解压屋</a>
      <a class="btn btn-secondary" href="play/index.html" target="_blank" rel="noopener">新窗口打开</a>
    </div>

    <div class="footer">
      游戏本体在 <code>play/</code> 目录下；如果启用 GitHub Pages，这个页面就是站点首页。
    </div>
  </main>
</body>
</html>
